  <body>
    <h2>Сортування масивів</h2>

    <script src="sortLib.js"></script>

    <script>
      // масив 100 елементів
      let arr = [];

      for (let i = 0; i < 100; i++) {
        arr.push(Math.floor(Math.random() * 1000));
      }
      // розріджений масив
      let sparse = [...arr];
      sparse[200] = 999;

      console.log("~ Звичайний масив ~");
      console.log(arr);
      sortLib.bubbleSort([...arr]);
      sortLib.selectionSort([...arr]);
      sortLib.insertionSort([...arr]);
      sortLib.shellSort([...arr]);
      sortLib.quickSort([...arr]);

      console.log("~ Розріджений масив ~");
      console.log(sparse);
      sortLib.bubbleSort([...sparse]);
      sortLib.selectionSort([...sparse]);
      sortLib.insertionSort([...sparse]);
      sortLib.shellSort([...sparse]);
      sortLib.quickSort([...sparse]);
    </script>
